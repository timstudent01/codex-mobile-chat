<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Session Chat</title>
        <link rel="stylesheet" href="/public/styles/chat.css" />
  </head>
  <body>
    <div class="app">
      <div class="top">
        <div class="top-bar">
          <div id="appTitle" class="title">Codex Session Chat</div>
          <div class="top-actions">
            <button id="menuBtn" class="menu-btn" type="button" aria-label="Open sessions">&#9776;</button>
            <button id="langBtn" class="lang-btn" type="button">中文</button>
            <select id="modelPicker" class="model-picker" aria-label="Model"></select>
          </div>
        </div>
        <div class="usage">
          <div id="usageContext" class="usage-line">Context -</div>
          <div id="usage5h" class="usage-line">5h -</div>
          <div id="usageWeek" class="usage-line">Week -</div>
          <div id="streamBadge" class="stream-badge">Realtime: Stream + Sync backup</div>
          <div id="helpWrap" class="help-wrap">
            <button id="helpBtn" class="help-btn" type="button" aria-label="Help">?</button>
            <div id="glossaryPanel" class="glossary"></div>
          </div>
          <div id="activityWrap" class="help-wrap">
            <button id="activityBtn" class="activity-btn" type="button" aria-label="Activity">...</button>
            <div id="activityPanel" class="activity-panel"></div>
          </div>
        </div>
        <select id="sessionPicker" class="session-picker"></select>
      </div>
      <div id="drawerBackdrop" class="drawer-backdrop">
        <aside class="drawer">
          <div class="drawer-head">
            <span id="drawerTitle">Sessions</span>
            <button id="drawerCloseBtn" class="drawer-close" type="button">&times;</button>
          </div>
          <div class="drawer-actions">
            <button id="newSessionBtn" class="new-session drawer-new-session" type="button">
              New Session
            </button>
          </div>
          <div id="sessionList" class="session-list"></div>
        </aside>
      </div>
      <div id="imageViewer" class="image-viewer" aria-hidden="true">
        <div class="image-viewer-inner">
          <button id="imageViewerClose" class="image-viewer-close" type="button" aria-label="Close">
            &times;
          </button>
          <img id="imageViewerImg" class="image-viewer-img" alt="preview" />
        </div>
      </div>
      <div id="chat" class="chat"></div>
      <div class="bottom">
        <form id="composerForm" class="composer">
          <textarea
            id="promptInput"
            placeholder="Message this session..."
            enterkeyhint="enter"
            inputmode="text"
          ></textarea>
          <div id="attachmentList" class="attachments"></div>
          <input id="imageInput" type="file" accept="image/*" multiple hidden />
          <div class="composer-footer">
            <div id="statusText" class="status">Ready</div>
            <div class="composer-actions">
              <button id="attachBtn" class="attach-btn" type="button">Image</button>
              <button id="sendBtn" class="send" type="submit">Send</button>
            </div>
          </div>
        </form>
      </div>
    </div>

        <script src="/public/scripts/chat.js"></script>
  </body>
</html>
